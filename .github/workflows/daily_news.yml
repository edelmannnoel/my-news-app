name: News Update Service

on:
  schedule:
    - cron: '0 5 * * *'  # Morgens (ca. 06:00/07:00 DE)
    - cron: '0 11 * * *' # Mittags (ca. 12:00/13:00 DE)
    - cron: '0 17 * * *' # Abends (ca. 18:00/19:00 DE)
  workflow_dispatch:      # Ermöglicht manuelles Starten über den "Run workflow" Button

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Berechtigungen, damit der Bot die briefing.json Datei ändern darf
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser google-genai

      - name: Fetch News and Generate Briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@github.com'
          git add briefing.json
          # Commit nur, wenn sich die Datei tatsächlich geändert hat
          git commit -m "Update News Briefing $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
